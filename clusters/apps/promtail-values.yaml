# Promtail for apps cluster
# Ships logs to Loki (optional)

# AMD64 image
image:
  repository: grafana/promtail
  tag: 3.2.1

# DaemonSet - runs on all nodes
daemonset:
  enabled: true

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Loki endpoint
config:
  clients:
    - url: http://loki.monitoring.svc:3100/loki/api/v1/push

  snippets:
    extraClientConfigs: |
      external_labels:
        cluster: apps
        environment: homelab

# Service monitor
serviceMonitor:
  enabled: true
  labels:
    cluster: apps
    release: kube-prometheus-stack

# Security context
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Tolerate all taints
tolerations:
  - effect: NoSchedule
    operator: Exists
