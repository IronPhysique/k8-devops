apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-demo
  namespace: demo
  labels:
    app: nginx-demo
    cluster: apps
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nginx-demo
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
