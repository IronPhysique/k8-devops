apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mgmt-platform
  namespace: argocd
spec:
  description: Management cluster platform components
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps-platform
  namespace: argocd
spec:
  description: Apps cluster platform components
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://192.168.178.139:6443
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: User application workloads
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://192.168.178.139:6443
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
