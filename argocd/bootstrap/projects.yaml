apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mgmt-platform
  namespace: argocd
spec:
  description: Management cluster platform components
  sourceRepos:
    - 'git@github.com:IronPhysique/k8-devops.git'
    - 'https://github.com/IronPhysique/k8-devops.git'
    - 'https://mojo2600.github.io/pihole-kubernetes'
    - 'https://grafana.github.io/helm-charts'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://charts.jetstack.io'
    - 'https://kubernetes-sigs.github.io/external-dns'
    - 'https://sealed-secrets.github.io/sealed-secrets'
  destinations:
    - namespace: 'argocd'
      server: https://kubernetes.default.svc
    - namespace: 'pihole'
      server: https://kubernetes.default.svc
    - namespace: 'monitoring'
      server: https://kubernetes.default.svc
    - namespace: 'cert-manager'
      server: https://kubernetes.default.svc
    - namespace: 'external-dns'
      server: https://kubernetes.default.svc
    - namespace: 'sealed-secrets'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
    - group: 'apiextensions.k8s.io'
      kind: CustomResourceDefinition
    - group: 'admissionregistration.k8s.io'
      kind: ValidatingWebhookConfiguration
    - group: 'admissionregistration.k8s.io'
      kind: MutatingWebhookConfiguration
    - group: 'cert-manager.io'
      kind: ClusterIssuer
    - group: 'externaldns.k8s.io'
      kind: DNSEndpoint
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps-platform
  namespace: argocd
spec:
  description: Apps cluster platform components
  sourceRepos:
    - 'git@github.com:IronPhysique/k8-devops.git'
    - 'https://github.com/IronPhysique/k8-devops.git'
    - 'https://grafana.github.io/helm-charts'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://charts.jetstack.io'
    - 'https://sealed-secrets.github.io/sealed-secrets'
  destinations:
    - namespace: 'monitoring'
      server: https://192.168.178.139:6443
    - namespace: 'cert-manager'
      server: https://192.168.178.139:6443
    - namespace: 'sealed-secrets'
      server: https://192.168.178.139:6443
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
    - group: 'apiextensions.k8s.io'
      kind: CustomResourceDefinition
    - group: 'admissionregistration.k8s.io'
      kind: ValidatingWebhookConfiguration
    - group: 'admissionregistration.k8s.io'
      kind: MutatingWebhookConfiguration
    - group: 'cert-manager.io'
      kind: ClusterIssuer
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: User application workloads
  sourceRepos:
    - 'git@github.com:IronPhysique/k8-devops.git'
    - 'https://github.com/IronPhysique/k8-devops.git'
    - 'https://github.com/IronPhysique/*'
  destinations:
    - namespace: 'amp'
      server: https://192.168.178.139:6443
    - namespace: 'app-*'
      server: https://192.168.178.139:6443
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
