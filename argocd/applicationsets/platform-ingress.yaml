---
# ApplicationSet: local ingresses for apps cluster
# Matches argocd/applications/platform/*/app.yaml
# Creates Ingress resources DIRECTLY on the apps cluster (no cross-cluster routing)
# Only generates apps when ingress.hostname is defined (using matrix + elementsYaml filter)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-ingress
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: git@github.com:IronPhysique/k8-devops.git
              revision: main
              files:
                - path: "argocd/applications/platform/*/app.yaml"
          - list:
              elements: []
              elementsYaml: |
                {{ if index .ingress "hostname" }}
                - dummy: "true"
                {{ end }}
  template:
    metadata:
      name: 'ingress-apps-{{ .path.basename }}'
    spec:
      project: apps-platform
      source:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        targetRevision: main
        path: argocd/applicationsets/templates/ingress
        helm:
          releaseName: '{{ .path.basename }}'
          valuesObject:
            hostname: '{{ index .ingress "hostname" }}'
            serviceName: '{{ index .ingress "serviceName" | default .path.basename }}'
            namespace: '{{ index .ingress "namespace" | default .path.basename }}'
            port: '{{ index .ingress "port" | default "80" }}'
            # Target IP for ExternalDNS (apps cluster Traefik LB)
            targetIP: '{{ index .ingress "targetIP" | default "192.168.178.139" }}'
      destination:
        # Deploy directly to apps cluster
        server: https://192.168.178.139:6443
        namespace: '{{ index .ingress "namespace" | default .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
