---
# ApplicationSet: Deploy all apps cluster applications
# Scans applications/apps/platform/*/app.yaml and applications/apps/services/*/app.yaml
# NOTE: This ApplicationSet expects all Helm apps to use ../config/values.yaml
# For non-Helm apps, the helm section is ignored
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        revision: main
        files:
          - path: "argocd/applications/apps/platform/*/app.yaml"
          - path: "argocd/applications/apps/services/*/app.yaml"
  template:
    metadata:
      name: '{{ .app.name }}'
    spec:
      project: '{{ .app.project }}'
      source:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        targetRevision: main
        path: '{{ .app.source.path }}'
        helm:
          releaseName: '{{ if .app.source.helm }}{{ .app.source.helm.releaseName }}{{ else }}{{ .app.name }}{{ end }}'
          valueFiles:
            - ../config/values.yaml
      destination:
        server: '{{ .app.destination.server }}'
        namespace: '{{ .app.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m
