---
# ApplicationSet: Deploy all apps-cluster (platform) applications
# Scans applications/platform/*/app.yaml
#
# Every field in app.yaml is optional — defaults are derived from the folder:
#   name / namespace / releaseName  -> folder name
#   source.path                     -> <folder>/charts
#   project                         -> apps-platform
#   destination.server              -> apps cluster
#   syncPolicy                      -> fleet default below
# Anything set in app.yaml overrides its default. syncPolicy is merged over
# the fleet default (maps deep-merge, lists replace). The app.yaml file must
# contain at least `app: {}`.
# For non-Helm apps (source.path pointing at manifests/), the helm section
# is ignored by Argo CD.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        revision: main
        files:
          - path: "argocd/applications/platform/*/app.yaml"

  template:
    metadata:
      name: '{{ dig "app" "name" .path.basename . }}'
    spec:
      project: '{{ dig "app" "project" "apps-platform" . }}'
      source:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        targetRevision: main
        path: '{{ dig "app" "source" "path" (printf "%s/charts" .path.path) . }}'
        helm:
          releaseName: '{{ dig "app" "source" "helm" "releaseName" .path.basename . }}'
          valueFiles:
            - '../config/values.yaml'

      destination:
        server: '{{ dig "app" "destination" "server" "https://192.168.178.139:6443" . }}'
        namespace: '{{ dig "app" "namespace" .path.basename . }}'

      # Fleet-default sync policy (per-app syncPolicy merges over this)
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m

  # Optional per-app fields that need template control flow are merged in
  # here. Go-template control flow is only valid inside templatePatch.
  templatePatch: |
    {{- $annotations := dig "app" "annotations" (dict) . }}
    {{- $skipCrds := dig "app" "source" "helm" "skipCrds" false . }}
    {{- $valueFiles := dig "app" "source" "helm" "valueFiles" (list) . }}
    {{- $syncPolicy := dig "app" "syncPolicy" (dict) . }}
    {{- if $annotations }}
    metadata:
      annotations:
        {{- range $key, $value := $annotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    {{- end }}
    {{- if or $skipCrds $valueFiles $syncPolicy }}
    spec:
      {{- if or $skipCrds $valueFiles }}
      source:
        helm:
          {{- if $skipCrds }}
          skipCrds: true
          {{- end }}
          {{- if $valueFiles }}
          valueFiles:
            {{- range $valueFiles }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
      {{- end }}
      {{- if $syncPolicy }}
      syncPolicy:
        {{- toYaml $syncPolicy | nindent 4 }}
      {{- end }}
    {{- end }}
