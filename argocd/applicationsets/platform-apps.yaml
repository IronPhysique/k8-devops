---
# ApplicationSet: Deploy all apps-cluster (platform) applications
# Scans applications/platform/*/app.yaml
# NOTE: This ApplicationSet expects all Helm apps to use ../config/values.yaml
# For non-Helm apps, the helm section is ignored
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        revision: main
        files:
          - path: "argocd/applications/platform/*/app.yaml"
  template:
    metadata:
      name: '{{ .app.name }}'
    spec:
      project: '{{ .app.project }}'
      source:
        repoURL: git@github.com:IronPhysique/k8-devops.git
        targetRevision: main
        path: '{{ .app.source.path }}'
        helm:
          releaseName: '{{ if .app.source.helm }}{{ .app.source.helm.releaseName }}{{ else }}{{ .app.name }}{{ end }}'
          valueFiles:
            - ../config/values.yaml
      destination:
        server: '{{ .app.destination.server }}'
        namespace: '{{ .app.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m

  # Optional per-app fields (annotations, helm skipCrds) are merged in here.
  # Go-template control flow is only valid inside templatePatch, not template.
  templatePatch: |
    {{- if .app.annotations }}
    metadata:
      annotations:
        {{- range $key, $value := .app.annotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    {{- end }}
    {{- if and .app.source.helm .app.source.helm.skipCrds }}
    spec:
      source:
        helm:
          skipCrds: true
    {{- end }}
