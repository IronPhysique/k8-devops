{{- if .Values.hostname }}
{{- if eq (.Values.port | int) 443 }}
# For HTTPS backends, use IngressRoute instead of Ingress for ServersTransport support
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.serviceName }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.hostname }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP | default "192.168.178.144" }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.hostname }}`)
      kind: Rule
      services:
        - name: {{ .Values.serviceName }}
          port: {{ .Values.port }}
          serversTransport: {{ .Values.serviceName }}-transport
  tls:
    secretName: {{ .Values.serviceName }}-tls
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: {{ .Values.serviceName }}-transport
spec:
  insecureSkipVerify: true
---
# Certificate for TLS (cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.serviceName }}-tls
spec:
  secretName: {{ .Values.serviceName }}-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.hostname }}
{{- else }}
# For HTTP backends, use standard Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.serviceName }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.hostname }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP | default "192.168.178.144" }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.hostname }}
      secretName: {{ .Values.serviceName }}-tls
  rules:
    - host: {{ .Values.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.serviceName }}
                port:
                  number: {{ .Values.port }}
{{- end }}
{{- end }}
