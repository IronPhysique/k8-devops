commonLabels:
  cluster: apps


kube-prometheus-stack:
  commonLabels:
    cluster: apps

  nodeExporter:
    enabled: false
    
  prometheusOperator:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

  prometheus:
    prometheusSpec:
      image:
        repository: prometheus/prometheus
        tag: v3.5.1

      retention: 30d
      retentionSize: "10GB"

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 512Mi

      serviceMonitorSelector:
        matchLabels:
          cluster: apps
      serviceMonitorNamespaceSelector: {}

      podMonitorSelector:
        matchLabels:
          cluster: apps
      podMonitorNamespaceSelector: {}

      externalLabels:
        cluster: apps
        environment: homelab

      enableAdminAPI: true

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

  grafana:
    enabled: true

    image:
      repository: grafana/grafana
      tag: 11.4.0

    adminPassword: "changeme"

    persistence:
      enabled: true
      size: 5Gi

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

    # The chart auto-provisions the default "Prometheus" datasource for its
    # own Prometheus, so only extra datasources are listed here.
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc:80
        jsonData:
          maxLines: 1000

    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: UTC

    # Chart-level ingress stays off; grafana.iron-lab.org is served by
    # charts/templates/ingress.yaml (see the ingress block at the bottom).
    ingress:
      enabled: false

    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"

  alertmanager:
    alertmanagerSpec:
      image:
        repository: prometheus/alertmanager
        tag: v0.30.1

      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi

  kube-state-metrics:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi


# Grafana ingress (rendered by charts/templates/ingress.yaml)
ingress:
  enabled: true
  hostname: grafana.iron-lab.org
  serviceName: kube-prometheus-stack-grafana
  port: 80
  # apps cluster Traefik LB (used by ExternalDNS)
  targetIP: 192.168.178.220
