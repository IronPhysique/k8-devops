# Kube-prometheus-stack application configuration
app:
  name: kube-prometheus-stack
  namespace: monitoring
  cluster: apps
  project: apps-platform

  source:
    path: argocd/applications/platform/kube-prometheus-stack/charts
    helm:
      releaseName: kube-prometheus-stack
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://192.168.178.139:6443

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

