# Loki configuration for SingleBinary deployment (single-node cluster)
# All values prefixed with 'loki:' for subchart dependency
loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  # SingleBinary mode - all in one pod
  singleBinary:
    replicas: 1
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    persistence:
      enabled: true
      size: 10Gi

  # Disable distributed components (not needed for single-node)
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

  # Disable components not needed for SingleBinary
  gateway:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  # Monitoring
  monitoring:
    serviceMonitor:
      enabled: true
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

  # Disable test
  test:
    enabled: false
