# Grafana-dashboards application configuration
# Plain ConfigMaps picked up by the Grafana dashboard sidecar
# (label grafana_dashboard: "1")
app:
  name: grafana-dashboards
  namespace: monitoring
  cluster: apps
  project: apps-platform

  source:
    path: argocd/applications/platform/grafana-dashboards/manifests

  destination:
    server: https://192.168.178.139:6443

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

