# Kubernetes-dashboard application configuration
app:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
  cluster: apps
  project: apps-platform

  source:
    path: argocd/applications/platform/kubernetes-dashboard/charts
    helm:
      releaseName: kubernetes-dashboard
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://192.168.178.139:6443

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

