# Alloy application configuration
app:
  name: alloy
  namespace: monitoring
  cluster: apps
  project: apps-platform

  # Helm chart configuration
  source:
    path: argocd/applications/platform/alloy/charts
    helm:
      releaseName: alloy
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://192.168.178.139:6443

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

