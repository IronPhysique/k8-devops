# Velero application configuration (cluster backup to S3)
app:
  name: velero
  namespace: velero
  cluster: apps
  project: apps-platform

  source:
    path: argocd/applications/platform/velero/charts
    helm:
      releaseName: velero
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://192.168.178.139:6443

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
