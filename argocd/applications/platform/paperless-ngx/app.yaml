# Paperless-ngx application configuration
app:
  name: paperless-ngx
  namespace: paperless
  cluster: apps
  project: applications

  # Source configuration
  source:
    path: argocd/applications/platform/paperless-ngx/manifests

  # Destination
  destination:
    server: https://192.168.178.139:6443

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

