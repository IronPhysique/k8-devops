{{- if .Values.pool }}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.pool.name | default "homelab" }}
spec:
  addresses:
    {{- range .Values.pool.addresses }}
    - {{ . }}
    {{- end }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.pool.name | default "homelab" }}
spec:
  ipAddressPools:
    - {{ .Values.pool.name | default "homelab" }}
{{- end }}
