---
# AMP Ingress with automatic DNS and TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amp-ingress
  namespace: amp
  annotations:
    # cert-manager: Automatically issue/renew Let's Encrypt certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # external-dns: Automatically create DNS A record in Cloudflare
    external-dns.alpha.kubernetes.io/hostname: amp.iron-lab.org
    
    # Traefik: Force HTTPS redirect
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - amp.iron-lab.org
      secretName: amp-tls
  rules:
    - host: amp.iron-lab.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amp
                port:
                  number: 8080
