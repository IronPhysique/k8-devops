commonLabels:
  cluster: apps

prometheusOperator:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

prometheus:
  prometheusSpec:
    image:
      repository: quay.io/prometheus/prometheus
      tag: v2.56.2
    retention: 30d
    retentionSize: "50GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
    serviceMonitorSelector:
      matchLabels:
        cluster: apps
    serviceMonitorNamespaceSelector: {}
    podMonitorSelector:
      matchLabels:
        cluster: apps
    podMonitorNamespaceSelector: {}
    externalLabels:
      cluster: apps
      environment: homelab
    enableAdminAPI: true
    remoteRead: []
    remoteWrite: []
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
  service:
    type: ClusterIP
    port: 9090
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"

grafana:
  enabled: false

alertmanager:
  alertmanagerSpec:
    image:
      repository: quay.io/prometheus/alertmanager
      tag: v0.27.0
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

kube-state-metrics:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector: {}
  tolerations:
    - effect: NoSchedule
      operator: Exists

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeApiserver: true
    kubeScheduler: false
    kubeControllerManager: false
    kubelet: true
    kubeProxy: false
    node: true
    prometheus: true
