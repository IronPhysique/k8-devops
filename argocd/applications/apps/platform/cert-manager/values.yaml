image:
  repository: quay.io/jetstack/cert-manager-controller
  tag: v1.16.2

installCRDs: true

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    namespace: cert-manager
    labels:
      release: kube-prometheus-stack

webhook:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

cainjector:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

securityContext:
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

global:
  leaderElection:
    namespace: cert-manager
