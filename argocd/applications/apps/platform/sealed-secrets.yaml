---
# Sealed Secrets for apps cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-sealed-secrets
  namespace: argocd
  labels:
    cluster: apps
    component: platform
spec:
  project: apps-platform
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      valueFiles:
        - '$values/argocd/clusters/apps/sealed-secrets-values.yaml'
  sources:
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: 2.16.2
    - repoURL: git@github.com:IronPhysique/k8-devops.git
      targetRevision: main
      ref: values
  destination:
    server: https://192.168.178.139:6443
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
