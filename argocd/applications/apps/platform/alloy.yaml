---
# Grafana Alloy for apps cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-alloy
  namespace: argocd
  labels:
    cluster: apps
    component: platform
spec:
  project: apps-platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 0.11.0
    helm:
      valueFiles:
        - '$values/argocd/clusters/apps/alloy-values.yaml'
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 0.11.0
    - repoURL: git@github.com:IronPhysique/k8-devops.git
      targetRevision: main
      ref: values
  destination:
    server: https://192.168.178.139:6443
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
