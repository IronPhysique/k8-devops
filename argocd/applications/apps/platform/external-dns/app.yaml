# External-DNS application configuration for apps cluster
# This instance manages DNS records for apps hosted on the apps cluster
# Uses a different txtOwnerId to prevent record conflicts with mgmt cluster
app:
  name: external-dns-apps
  namespace: external-dns
  cluster: apps
  project: apps-platform

  source:
    path: argocd/applications/apps/platform/external-dns/charts
    helm:
      releaseName: external-dns
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://192.168.178.139:6443

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

# Ingress configuration
ingress:
  enabled: false
