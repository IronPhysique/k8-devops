# Traefik application configuration
app:
  name: traefik-apps
  namespace: traefik
  cluster: apps
  project: apps-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"

  # Helm chart configuration
  source:
    path: argocd/applications/apps/platform/traefik/charts
    helm:
      releaseName: traefik
      # Skip CRD installation when rendering with Helm.  Without this, the Traefik
      # chart automatically installs Gateway API and other CRDs from its `crds`
      # directory.  Argo CD interprets CRDs as normal resources and applies
      # them as part of the application, which leads to duplicate CRD objects
      # and RepeatedResourceWarning.  Setting `skipCrds` prevents those CRDs
      # from being installed by this application.  Traefik-specific CRDs
      # (IngressRoute, Middleware, etc.) should be installed by the separate
      # `traefik-crds` chart.
      skipCrds: true
      valueFiles:
        - ../config/values.yaml

  # Destination
  destination:
    server: https://192.168.178.139:6443

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

# Ingress configuration (used by app-routes)
ingress:
  enabled: false
