---
# Custom DNS entries for Pi-hole
# These are added to /etc/addn-hosts in the Pi-hole container
apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole-custom-dns
  namespace: pihole
data:
  # Point local domains to mgmt cluster IP (nginx-router will handle routing)
  custom-dns.list: |
    192.168.178.144 argocd.local
    192.168.178.144 argocd.home
    192.168.178.144 pihole.local
    192.168.178.144 pihole.home
    192.168.178.144 grafana.local
    192.168.178.144 grafana.home
    192.168.178.144 amp.local
    192.168.178.144 amp.home
