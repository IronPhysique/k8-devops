apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pihole

helmCharts:
  - name: pihole
    repo: https://mojo2600.github.io/pihole-kubernetes
    version: 2.26.1
    releaseName: pihole
    namespace: pihole
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
      name: pihole
    path: hostport.yaml
