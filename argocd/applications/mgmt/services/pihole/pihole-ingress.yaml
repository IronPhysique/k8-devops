---
# Pi-hole Ingress with automatic DNS and TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole-ingress
  namespace: pihole
  annotations:
    # cert-manager: Automatically issue/renew Let's Encrypt certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # external-dns: Set DNS A record to node IP
    external-dns.alpha.kubernetes.io/target: "192.168.178.144"

    # Traefik: Force HTTPS redirect
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pihole.iron-lab.org
      secretName: pihole-tls
  rules:
    - host: pihole.iron-lab.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pihole-web
                port:
                  number: 80
