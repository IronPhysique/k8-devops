# Pi-hole DNS and ad-blocking for homelab (GitOps-friendly)

image:
  repository: pihole/pihole
  tag: "2024.07.0"

# Upstream DNS resolvers (Pi-hole forwards here)
DNS1: "1.1.1.1"
DNS2: "1.0.0.1"

# IMPORTANT:
# Do NOT set adminPassword / WEBPASSWORD here if the chart already uses the
# pihole-password secret (your deployment showed it does). Avoid duplicates.

serviceDhcp:
  enabled: false

# Web UI: do NOT use NodePort (avoid 30053 conflicts); access via ingress/nginx-router
serviceWeb:
  type: ClusterIP
  http:
    enabled: true
    port: 80
  https:
    enabled: false

# DNS service: ClusterIP is fine; hostNetwork exposes :53 on the node
serviceDns:
  type: ClusterIP
  port: 53

persistentVolumeClaim:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

extraEnvVars:
  TZ: "UTC"

# Ingress for web UI (optional if you also use nginx-router)
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
  hosts:
    - pihole.mgmt.local
  tls:
    - secretName: pihole-tls
      hosts:
        - pihole.mgmt.local

monitoring:
  podMonitor:
    enabled: true
    labels:
      cluster: mgmt
      release: kube-prometheus-stack

# Scheduling
nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - prometheus
          topologyKey: kubernetes.io/hostname

# CRITICAL: expose DNS on node port 53
# (Set in both common locations so the chart definitely picks it up)
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

pod:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

# DO NOT re-add podDnsConfig — it was forcing dnsPolicy: None and broke host DNS
