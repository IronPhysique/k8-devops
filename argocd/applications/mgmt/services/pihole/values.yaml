# Disable hostNetwork to avoid port conflicts with Traefik
# Pi-hole will use standard Kubernetes services instead
hostNetwork: false

# Use standard ClusterFirst DNS policy since we're not using hostNetwork
dnsPolicy: ClusterFirst

# Use standard HTTP port 80 since we're not on hostNetwork
# Traefik will handle the external access
webHttp: "80"

# Disable HTTPS - Traefik will handle TLS termination
# Note: Chart still requires a port value, using 8443 but won't be exposed
webHttps: "8443"

# Service configuration
service:
  type: NodePort
  dns:
    # Expose DNS on NodePort for LAN access
    type: NodePort
  https:
    # Disable HTTPS service - Traefik handles TLS
    enabled: false

# Custom DNS entries for home domains
dnsmasq:
  additionalHostsEntries:
    - "192.168.178.144 argocd.home"
    - "192.168.178.144 pihole.home"
    - "192.168.178.144 grafana.home"
    - "192.168.178.144 amp.home"
  customSettings:
    - "except-interface=lo"
