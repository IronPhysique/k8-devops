# Bind DNS directly to the node on port 53
# This allows Pi-hole to act as a real LAN DNS server
hostNetwork: true

# DNS configuration for hostNetwork mode
dnsPolicy: ClusterFirstWithHostNet

# Change web UI port to avoid conflict with Traefik on port 80
# Pi-hole will listen on port 8053 for HTTP
webHttp: "8053"
# Disable HTTPS to free up port 443 for Traefik
# Empty string disables the HTTPS port entirely
webHttps: ""

# Environment variables to configure Pi-hole
extraEnvVars:
  WEB_PORT: "8053"
  DNSMASQ_LISTENING: "all"

# Service configuration (hostNetwork bypasses service, but keep for compatibility)
service:
  type: ClusterIP
  https:
    # Disable HTTPS to free up port 443 for Traefik
    enabled: false

# Custom DNS entries for home domains
dnsmasq:
  additionalHostsEntries:
    - "192.168.178.144 argocd.home"
    - "192.168.178.144 pihole.home"
    - "192.168.178.144 grafana.home"
    - "192.168.178.144 amp.home"
  customSettings:
    - "except-interface=lo"
