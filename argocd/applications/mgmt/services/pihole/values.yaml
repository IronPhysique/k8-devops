# Bind DNS directly to the node on port 53
# This allows Pi-hole to act as a real LAN DNS server
hostNetwork: true

# DNS configuration for hostNetwork mode
dnsPolicy: ClusterFirstWithHostNet

# Change web UI port to avoid conflict with nginx-router on port 80
# Pi-hole will listen on port 8053 for HTTP
webHttp: "8053"

# Environment variables to configure Pi-hole
extraEnvVars:
  WEB_PORT: "8053"
  DNSMASQ_LISTENING: "all"

# Service configuration (hostNetwork bypasses service, but keep for compatibility)
service:
  type: ClusterIP

# Custom DNS entries for local domains
dnsmasq:
  additionalHostsEntries:
    - 192.168.178.144 argocd.local
    - 192.168.178.144 pihole.local
    - 192.168.178.144 grafana.local
  customSettings: |
    # Override interface restriction - listen on all except loopback
    except-interface=lo
