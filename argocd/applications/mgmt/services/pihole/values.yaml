# Pi-hole DNS and ad-blocking for homelab

image:
  repository: pihole/pihole
  tag: "2024.07.0"

# Upstream DNS (Pi-hole forwards here)
DNS1: "1.1.1.1"
DNS2: "1.0.0.1"

adminPassword: "changeme" # replace with SealedSecret later

# DNS service (internal only, hostNetwork does the real exposure)
serviceDns:
  type: ClusterIP
  port: 53

serviceDhcp:
  enabled: false

# Web UI
serviceWeb:
  type: NodePort
  http:
    enabled: true
    port: 80
    nodePort: 30053
  https:
    enabled: false

# Storage
persistentVolumeClaim:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Environment
extraEnvVars:
  TZ: "UTC"
  WEBPASSWORD: "changeme"
  PIHOLE_DNS_: "1.1.1.1;1.0.0.1"

# Ingress (optional, nginx already handles most routing)
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
  hosts:
    - pihole.mgmt.local
  tls:
    - secretName: pihole-tls
      hosts:
        - pihole.mgmt.local

# Monitoring
monitoring:
  podMonitor:
    enabled: true
    labels:
      cluster: mgmt
      release: kube-prometheus-stack

# 🚨 THIS IS THE IMPORTANT PART 🚨
pod:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

# Scheduling
nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - prometheus
          topologyKey: kubernetes.io/hostname
