---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  trivy-operator.json: |
    {
      "annotations": {
        "list": []
      },
      "description": "Trivy Operator Vulnerability Dashboard",
      "editable": true,
      "gnetId": 16337,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 10
                  },
                  {
                    "color": "red",
                    "value": 50
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": {}
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"})",
              "refId": "A"
            }
          ],
          "title": "Critical Vulnerabilities",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 20
                  },
                  {
                    "color": "red",
                    "value": 100
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": {}
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"High\"})",
              "refId": "A"
            }
          ],
          "title": "High Vulnerabilities",
          "type": "gauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["trivy", "security"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Trivy Operator Vulnerabilities",
      "uid": "trivy-operator",
      "version": 1
    }
