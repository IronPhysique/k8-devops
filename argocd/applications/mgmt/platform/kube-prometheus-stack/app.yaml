# Kube-prometheus-stack application configuration
app:
  name: kube-prometheus-stack
  namespace: monitoring
  cluster: mgmt
  project: mgmt-platform

  source:
    path: argocd/applications/mgmt/platform/kube-prometheus-stack/charts
    helm:
      releaseName: kube-prometheus-stack
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

# Ingress configuration (used by app-routes-mgmt)
# ExternalDNS will create: grafana.iron-lab.org -> 192.168.178.144
ingress:
  enabled: true
  hostname: grafana.iron-lab.org
  namespace: monitoring
  serviceName: kube-prometheus-stack-grafana
  port: 80
