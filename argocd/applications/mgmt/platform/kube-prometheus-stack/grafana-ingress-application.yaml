---
# ArgoCD Application for Grafana Ingress
# Separate application to manage ingress alongside Helm chart
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-grafana-ingress
  namespace: argocd
  labels:
    cluster: mgmt
    component: platform
spec:
  project: mgmt-platform
  source:
    repoURL: git@github.com:IronPhysique/k8-devops.git
    targetRevision: main
    path: argocd/applications/mgmt/platform/kube-prometheus-stack
    directory:
      include: grafana-ingress.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
