---
# Ingress for ArgoCD with automatic Let's Encrypt certificate
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # Automatically request Let's Encrypt certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Nginx ingress annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - argocd.iron-lab.org
    secretName: argocd-tls  # cert-manager will create this automatically
  rules:
  - host: argocd.iron-lab.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
---
# Ingress for Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - grafana.iron-lab.org
    secretName: grafana-tls
  rules:
  - host: grafana.iron-lab.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mgmt-kube-prometheus-stack-grafana
            port:
              number: 80
---
