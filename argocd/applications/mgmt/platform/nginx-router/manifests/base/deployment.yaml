---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-router
  namespace: nginx-router
  labels:
    app: nginx-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-router
  template:
    metadata:
      labels:
        app: nginx-router
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          protocol: TCP
        - containerPort: 443
          protocol: TCP
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: tls-certs
          mountPath: /etc/nginx/certs
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-router-config
      - name: tls-certs
        secret:
          secretName: iron-lab-org-tls
          optional: true  # Don't fail if cert isn't ready yet
      nodeSelector:
        kubernetes.io/arch: arm64
