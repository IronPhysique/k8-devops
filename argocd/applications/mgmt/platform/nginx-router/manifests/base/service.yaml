---
apiVersion: v1
kind: Service
metadata:
  name: nginx-router
  namespace: nginx-router
spec:
  type: NodePort
  selector:
    app: nginx-router
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30180
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    nodePort: 30543
    protocol: TCP
  externalIPs:
    - 192.168.178.144
