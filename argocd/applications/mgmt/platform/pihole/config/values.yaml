# Pi-hole subchart overrides (nest under pihole for Helm parent → subchart)
pihole:
  # Pi-hole using host network for DNS on port 53
  # Web interface on port 8080 (can't use 80 as Traefik LB uses it on same host IP)
  hostNetwork: true
  podDnsConfig:
    enabled: false

  extraEnvVars:
    DNSMASQ_LISTENING: "all"

  # Web interface on port 8080 - avoids conflict with Traefik on port 80
  webHttp: "8080"
  serviceWeb:
    type: ClusterIP
    http:
      enabled: true
      port: 8080
    https:
      enabled: false

  serviceDns:
    type: ClusterIP
    port: 53

  probes:
    liveness:
      type: command
      enabled: true
      command:
        - /bin/sh
        - -c
        - "curl -f -s http://localhost:8080/admin/login.php > /dev/null || exit 1"
      initialDelaySeconds: 60
      failureThreshold: 10
      timeoutSeconds: 5
    readiness:
      enabled: false

  dnsmasq:
    customSettings:
      - "except-interface=lo"
