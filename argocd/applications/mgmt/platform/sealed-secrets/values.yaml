fullnameOverride: sealed-secrets-controller

image:
  repository: bitnami/sealed-secrets-controller
  tag: v0.27.4

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

commandArgs:
  - --update-status=true

metrics:
  serviceMonitor:
    enabled: true
    namespace: sealed-secrets
    labels:
      release: kube-prometheus-stack

podSecurityContext:
  fsGroup: 65534

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
