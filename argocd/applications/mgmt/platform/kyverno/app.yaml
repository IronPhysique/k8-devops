# Kyverno application configuration
app:
  name: kyverno
  namespace: kyverno
  cluster: mgmt
  project: mgmt-platform

  source:
    path: argocd/applications/mgmt/platform/kyverno/charts
    helm:
      releaseName: kyverno
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

# Ingress configuration
ingress:
  enabled: false
