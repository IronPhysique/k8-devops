---
# ArgoCD Application for ArgoCD Ingress
# Separate application to manage ingress for ArgoCD itself
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-argocd-ingress
  namespace: argocd
  labels:
    cluster: mgmt
    component: platform
spec:
  project: mgmt-platform
  source:
    repoURL: git@github.com:IronPhysique/k8-devops.git
    targetRevision: main
    path: argocd/applications/mgmt/platform/argocd-ingress
    directory:
      include: ingress.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
