---
# ArgoCD Ingress with automatic DNS and TLS
# Note: ArgoCD requires WebSocket support for the UI
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # cert-manager: Automatically issue/renew Let's Encrypt certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Traefik: Force HTTPS redirect
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.iron-lab.org
      secretName: argocd-tls
  rules:
    - host: argocd.iron-lab.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
