# Traefik configuration for mgmt cluster
# All values are prefixed with 'traefik:' for subchart dependency
traefik:
  # Use DaemonSet for best performance and host port binding
  deployment:
    kind: DaemonSet

  crds:
    enabled: false

  # Disable Gateway API resources completely
  gateway:
    enabled: false

  gatewayClass:
    enabled: false

  experimental:
    kubernetesGateway:
      enabled: false

  # Enable dashboard for monitoring
  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik-mgmt.iron-lab.org`)
      entryPoints: ["websecure"]

  # Ports configuration
  # Note: DNS (port 53) is handled by Pi-hole via hostNetwork
  ports:
    web:
      exposedPort: 80
    websecure:
      exposedPort: 443
      tls:
        enabled: true

  # Service configuration - LoadBalancer with external IP for single-node k3s
  service:
    type: LoadBalancer
    externalIPs:
      - 192.168.178.144

  # Enable Prometheus metrics
  metrics:
    prometheus:
      enabled: true
      entryPoint: metrics
      service:
        enabled: true

  # Enable access logs for debugging
  logs:
    general:
      level: INFO
    access:
      enabled: true

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # Security context
  securityContext:
    capabilities:
      drop: [ALL]
      add: [NET_BIND_SERVICE]
    readOnlyRootFilesystem: true
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0

  # Providers
  providers:
    kubernetesIngress:
      enabled: true
      publishedService:
        enabled: false
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
    # Disable Gateway API to avoid CRD conflicts
    kubernetesGateway:
      enabled: false

  # Set static IP for ingress status since no cloud LB is available
  additionalArguments:
    - "--providers.kubernetesingress.ingressendpoint.ip=192.168.178.144"
