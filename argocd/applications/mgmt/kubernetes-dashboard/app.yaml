# Kubernetes-dashboard application configuration
app:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
  cluster: mgmt
  project: mgmt-platform

  source:
    path: argocd/applications/mgmt/kubernetes-dashboard/charts
    helm:
      releaseName: kubernetes-dashboard
      valueFiles:
        - ../config/values.yaml

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

# Ingress configuration (used by mgmt-ingress)
# ExternalDNS will create: dashboard.iron-lab.org -> 192.168.178.144
ingress:
  enabled: true
  hostname: dashboard.iron-lab.org
  namespace: kubernetes-dashboard
  serviceName: kubernetes-dashboard-kong-proxy
  port: 443
