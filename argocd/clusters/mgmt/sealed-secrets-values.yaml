# Sealed Secrets Controller for mgmt cluster
# Enables GitOps-safe secret management

fullnameOverride: sealed-secrets-controller

# ARM64 support
image:
  repository: bitnami/sealed-secrets-controller
  tag: v0.27.4

# Resource limits for Pi 5
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# High availability not needed for homelab
# Single replica is sufficient
commandArgs:
  - --update-status=true

# Metrics for Prometheus scraping
metrics:
  serviceMonitor:
    enabled: true
    namespace: sealed-secrets
    labels:
      release: kube-prometheus-stack

# Security context
podSecurityContext:
  fsGroup: 65534

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
