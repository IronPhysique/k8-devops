# Sealed Secrets Controller for apps cluster
# Note: Each cluster has its own sealing key

fullnameOverride: sealed-secrets-controller

# AMD64 image (multi-arch)
image:
  repository: bitnami/sealed-secrets-controller
  tag: v0.27.4

# Resource limits for PC hardware
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

commandArgs:
  - --update-status=true

# Metrics for Prometheus scraping
metrics:
  serviceMonitor:
    enabled: true
    namespace: sealed-secrets
    labels:
      release: kube-prometheus-stack

# Security context
podSecurityContext:
  fsGroup: 65534

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
